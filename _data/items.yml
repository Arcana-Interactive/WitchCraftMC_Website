# ══════════════════════════════════════════════════════
#  WitchCraftMC — Item Registry
#  _data/items.yml
# ══════════════════════════════════════════════════════
#
#  Add a new entry here whenever you add a new item
#  texture to /img/icons/items/.
#
#  Keys
#  ────
#  name      Display name shown in tooltips & recipe labels
#  img       Path to the item's texture (16×16 or 32×32 PNG)
#  tooltip   Minetip tooltip text
#              · Use  /  to start a new line
#              · Use  &e  &7  &a  etc. for Minecraft colour codes
#              · First line is the item title (auto-styled)
#  link      (optional) Wiki page URL — makes the item clickable
#              · Example:  link: /wiki/pyroclastic/
#  tags      (optional) List of extra lore lines appended below the tooltip
#              · Each tag is its own line — use Minecraft colour codes freely
#              · Rendered after a blank separator from the base tooltip
#              · Example:
#                  tags:
#                    - "&6⚔ Attack Damage: &f+10"
#                    - "&9✦ Soulbound"
#                    - "&8Custom Item"
#
#  ── Using items inline (in articles & infoboxes) ────
#
#  Once an item is defined here, you can drop it into any wiki-page
#  body (or infobox value) using one of these placeholders. They
#  render as clickable inventory slots with the full minetip tooltip:
#
#      {item:pyroclastic_pickaxe}        ← explicit form, always works
#      {pyroclastic_pickaxe}             ← bare alias, if the id is unique
#                                          and not also a {tag_*} or
#                                          {dropdown} marker
#
#  Examples (drop into a markdown wiki page):
#      Trade a {vote_key} at the {item:vote_trader} for prizes.
#      | Reward | Cost            |
#      |--------|-----------------|
#      | {pyroclastic_pickaxe} | 12 {pyroclastic_core} |
#
#  Both forms work inside `Infobox.Sections[*].rows[*].value`, regular
#  prose, table cells, and `<span class="mc-text">…</span>` blocks.
#
# ══════════════════════════════════════════════════════

