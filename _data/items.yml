# ══════════════════════════════════════════════════════
#  WitchCraftMC — Item Registry
#  _data/items.yml
# ══════════════════════════════════════════════════════
#
#  Add a new entry here whenever you add a new item
#  texture to /img/icons/items/.
#
#  Keys
#  ────
#  name      Display name shown in tooltips & recipe labels
#  img       Path to the item's texture (16×16 or 32×32 PNG)
#  tooltip   Minetip tooltip text
#              · Use  /  to start a new line
#              · Use  &e  &7  &a  etc. for Minecraft colour codes
#              · First line is the item title (auto-styled)
#  tags      (optional) List of extra lore lines appended below the tooltip
#              · Each tag is its own line — use Minecraft colour codes freely
#              · Rendered after a blank separator from the base tooltip
#              · Example:
#                  tags:
#                    - "&6⚔ Attack Damage: &f+10"
#                    - "&9✦ Soulbound"
#                    - "&8Custom Item"
#
# ══════════════════════════════════════════════════════

