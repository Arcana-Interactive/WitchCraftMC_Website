# ══════════════════════════════════════════════════════
#  WitchCraftMC — Stat Tables
#  _data/stat_tables.yml
# ══════════════════════════════════════════════════════
#
#  Defines reusable stat / comparison tables that can be
#  dropped into any wiki page with:
#
#    {% include stat-table.html id="pyroclastic_tools" %}
#
#  Inspired by the Hypixel SkyBlock Wiki "Armor of Divan"
#  set table — a grid of cells, each with a centered
#  header, an icon, the item's display name, and a list
#  of stat / lore lines.
#
#  Keys
#  ────
#  title       (optional) Caption shown above the table
#  layout      (optional) "table"   (default — grid)
#                         "rows"    (legacy — one row per item)
#                         "columns" (legacy — side-by-side compares)
#  cols        (optional, table layout only) Cells per row.
#              Default 2.
#  columns     List of entries. Each entry has:
#                header        Heading shown above the cell
#                              (e.g. "Pickaxe")
#                item          Item ID from items.yml — renders the
#                              icon + tooltip
#                description   List of stat / lore lines (Markdown
#                              + Minecraft colour codes &7, &6, &a
#                              all work)
#  total       (optional, table layout only) Renders a final cell
#              spanning the full width. Same fields as a column
#              entry plus an optional `header` (defaults to "Total").
#
#  Optional entry key:
#    label     Override the item's display name shown next to the
#              icon
#
#  Override at include time:
#    {% include stat-table.html id="..." layout="columns" %}
#
# ══════════════════════════════════════════════════════

# ── Pyroclastic toolset ────────────────────────────────
pyroclastic_set:
  title: "Pyroclastic Set"
  layout: table
  cols: 2
  columns:
    - header: "Pickaxe"
      item: pyroclastic_pickaxe
      description:
        - "&7Fortune V"
        - "&7Efficiency IX"
        - "&7Unbreaking IX"
        - "&7Mending"
