# ══════════════════════════════════════════════════════
#  WitchCraftMC — Shop GUI Registry
#  _data/shops.yml
# ══════════════════════════════════════════════════════
#
#  Each shop entry represents a chest-based GUI interface.
#  Render a shop on any wiki page with:
#
#    {% include shop-gui.html id="blacksmith" %}
#
#  Keys
#  ────
#  title   Display name shown as the chest GUI title bar
#  rows    Number of chest rows (1–6). Default: 3
#  slots   List of occupied slot entries (0-indexed, 0 = top-left)
#
#  Custom UI texture (optional)
#  ─────────────────
#  texture       Path to a GUI background image (replaces the grey chest look)
#  title_color   Hex colour for the title text when using a custom texture
#
#  Example:
#    my_custom_shop:
#      title: "Enchanting Table"
#      rows: 3
#      texture: "/img/ui/enchanting_gui.png"
#      title_color: "#4a412a"
#      slots:
#        - slot: 0
#          item: diamond
#
#  Slot keys
#  ─────────
#  slot    Slot index (0 = row 1 col 1, 8 = row 1 col 9, 9 = row 2 col 1, …)
#  item    Item key from _data/items.yml
#  label   (optional) Override the item's display name in the tooltip title
#  price   (optional) Price string appended to tooltip  e.g. "50 Coins"
#
# ══════════════════════════════════════════════════════

# ── Example: Blacksmith shop ───────────────────────────
