# ══════════════════════════════════════════════════════
#  WitchCraftMC — Crafting Recipes
#  _data/recipes.yml
# ══════════════════════════════════════════════════════
#
#  Each recipe needs a unique ID (used in the include call).
#
#  Keys
#  ────
#  result          Item ID from items.yml
#  result_count    (optional) Stack size of the output. Default: 1
#  shapeless       (optional) Set to true for shapeless recipes.
#                  Shows a label — items can go in any slot.
#  grid            3 rows of exactly 3 slots each.
#                  Use ~ for an empty slot.
#
#  Usage in any wiki page
#  ──────────────────────
#  {% include crafting-recipe.html id="backpack" %}
#
# ══════════════════════════════════════════════════════

# ── Custom recipes ─────────────────────────────────────

charcoal_block:
  result: coal_block
  grid:
    - [charcoal, charcoal, charcoal]
    - [charcoal, charcoal, charcoal]
    - [charcoal, charcoal, charcoal]
arcanium_ingot:
  result: arcanium_ingot
  grid:
    - [arcanium_fragments, arcanium_fragments, arcanium_fragments]
    - [arcanium_fragments, arcanium_fragments, arcanium_fragments]
    - [arcanium_fragments, arcanium_fragments, arcanium_fragments]
arcanium_block:
  result: arcanium_block
  grid:
    - [arcanium_ingot, arcanium_ingot, arcanium_ingot]
    - [arcanium_ingot, arcanium_ingot, arcanium_ingot]
    - [arcanium_ingot, arcanium_ingot, arcanium_ingot]

pyroclastic_sword:
  result: pyroclastic_sword
  grid:
    - [~, arcanium_ingot,~]
    - [~, pyroclastic_core,~]
    - [arcanium_ingot,stick,arcanium_ingot]
pyroclastic_hoe:
  result: pyroclastic_hoe
  grid:
    - [arcanium_ingot, arcanium_ingot,~]
    - [~, pyroclastic_core,~]
    - [~,stick,~]
pyroclastic_axe:
  result: pyroclastic_axe
  grid:
    - [arcanium_ingot, arcanium_ingot,~]
    - [arcanium_ingot, pyroclastic_core,~]
    - [~,stick,~]
pyroclastic_shovel:
  result: pyroclastic_shovel
  grid:
    - [~, arcanium_ingot,~]
    - [~, pyroclastic_core,~]
    - [~,stick,~]
pyroclastic_pickaxe:
  result: pyroclastic_pickaxe
  grid:
    - [arcanium_ingot, arcanium_ingot,arcanium_ingot]
    - [~, pyroclastic_core,~]
    - [~,stick,~]
pyroclastic_rod:
  result: pyroclastic_rod
  grid:
    - [~, ~, pyroclastic_core]
    - [~, stick,arcanium_ingot]
    - [stick,~,arcanium_ingot]
pyroclastic_bow:
  result: pyroclastic_bow
  grid:
    - [~, arcanium_ingot,stick]
    - [arcanium_ingot, ~,pyroclastic_core]
    - [~,arcanium_ingot,stick]