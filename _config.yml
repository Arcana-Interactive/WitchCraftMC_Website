# Site settings
title: WitchCraftMC
url: https://github.com/jeromelachaud/freelancer-theme
description: "A website for WitchCraftMC!"
keywords: "WitchCraftMC, Witchcraft, Minecraft"

# Google webmaster tools
google_verify:

# https://ssl.bing.com/webmaster/configure/verify/ownership Option 2 content= goes here
bing_verify:

# Contact form:
# - static : pass through formspree.io to validate email sending
# - disqus : replace contact form by disqus thread
# - comment the line below if you want to stick with the default PHP contact form
#contact: static

# If you use disqus you need disqus shortname
# https://help.disqus.com/customer/portal/articles/466208
#disqus_shortname: myshortname

# Color settings (hex-codes without the leading hash-tag)
color:
  primary: 9f6cba #80B3FF
  primary-rgb: "159,108,186" #"128,179,255"
  secondary: 26162e #FD6E8A
  secondary-dark: 26162e #A2122F
  
# Footer settings
footer:
  copyright: WitchCraftMC 2026. All rights reserved.
  subtitle: We are not affiliated with Mojang AB or Microsoft.
  social: Social Links

# Social networks usernames (Going to add reddit later)
social:
  - title: discord
    url: http://discord.gg/5gHJtxrMZS
  - title: youtube
    url: https://youtube.com/@witchcraftserver
  - title: tiktok
    url: https://www.tiktok.com/@thewitchcraftserver
  - title: twitch
    url: https://www.twitch.tv/witchcraftmc
  - title: kick
    url: https://kick.com/witchcraftmc
  - title: instagram
    url: https://www.instagram.com/witchcraftserver/
  - title: twitter
    url: https://x.com/WitchCraftMC
    
# Build settings
markdown: kramdown
permalink: pretty

# ── Wiki settings ──────────────────────────────────────────
wiki:
  title: "WitchCraftMC Wiki"
  description: "The complete knowledge base for WitchCraftMC players."

defaults:
  - scope:
      path: "wiki"
      type: "pages"
    values:
      layout: "wiki-page"
